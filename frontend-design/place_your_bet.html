<style>
        body {
            background-color: #050505; /* background-deep */
            color: #e5e2e1; /* on-background */
        }
        
        .modal-overlay {
            background: radial-gradient(circle at top left, rgba(0, 212, 255, 0.1), transparent 50%),
                        radial-gradient(circle at bottom right, rgba(123, 47, 247, 0.1), transparent 50%),
                        rgba(5, 5, 5, 0.85); /* background-deep with opacity */
            backdrop-filter: blur(24px);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03); /* surface-glass */
            border: 1px solid rgba(255, 255, 255, 0.1); /* border-stroke */
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .glass-panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            pointer-events: none;
        }

        .btn-primary-neon {
            background-color: #00d4ff; /* primary-container */
            color: #00586b; /* on-primary-container */
            transition: all 0.3s ease;
        }

        .btn-primary-neon:hover {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); /* neon-cyan-glow */
            transform: translateY(-2px);
        }

        .chip-selector {
            background: #1c1b1b; /* surface-container-low */
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .chip-selector:hover, .chip-selector.active {
            border-color: #00d4ff; /* primary-container */
            color: #a8e8ff; /* primary */
            background: rgba(0, 212, 255, 0.05);
        }

        .custom-input:focus {
            outline: none;
            border-color: transparent;
            box-shadow: 0 0 0 1px #00d4ff, inset 0 0 10px rgba(0, 212, 255, 0.2);
        }
        
        .gradient-text {
            background: linear-gradient(90deg, #a8e8ff, #d2bbff); /* primary to secondary */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Particles container for aesthetic */

<!-- Simple script for interactivity demonstration -->
<script>
        document.querySelectorAll('.chip-selector').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.chip-selector').forEach(c => {
                    c.classList.remove('active', 'text-primary');
                    c.classList.add('text-on-surface-variant');
                });
                this.classList.add('active', 'text-primary');
                this.classList.remove('text-on-surface-variant');
                
                const input = document.querySelector('input[type="number"]');
                input.value = this.innerText;
                
                // Simulate calculation update
                const val = parseFloat(this.innerText);
                const returnVal = val * 2.4;
                const fee = val * 0.02;
                const toWin = returnVal - fee;
                
                document.querySelectorAll('.bg-surface-container-lowest span.font-data-mono')[0].innerText = returnVal.toFixed(2) + ' USDT';
                document.querySelectorAll('.bg-surface-container-lowest span.font-data-mono')[1].innerText = '-' + fee.toFixed(2) + ' USDT';
                document.querySelector('.text-headline-lg-mobile').innerHTML = toWin.toFixed(2) + ' <span class="text-body-sm font-body-sm text-on-surface-variant ml-xs">USDT</span>';
            });
        });
